<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<title>Survey</title>
</head>
<body>

	<form action="index.php" name="my form" method="POST" accept-charset="utf-8">
		First name:<input type="text" name="firstname">
		<br>
		Last name:<input type="text" name="lastname">
		<br>
		<br>

		<!-- 单选 -->
		Are you:
		<br>
		<input type="radio" name="sex" value="male"> Male
		<br>
		<input type="radio" name="sex" value="male"> Female
		<br>
		<br>

		<!-- 多选 -->
		I like:
		<br>
		<input type="checkbox" name="Apples" value="Apples"> Apples
		<br>
		<input type="checkbox" name="Oranges" value="Oranges"> Oranges
		<br>
		<input type="checkbox" name="Bananas" value="Bananas"> Bananas
		<br>
		<br>

		<!-- 下拉选择列表 -->
		What is your favourite fruits?
		<br>
		<select name="favourite">
			<option value="Apples" selected="selected">Apples</option>
			<option value="Oranges">Oranges</option>
			<option value="Bananas">Bananas</option>
		</select>
		<br>
		<br>

		<!-- 评论框 -->
		Comments:
		<br>
			<textarea rows="5" cols="30"></textarea>
		<br>

		<input type="Submit" value="Submit the questionnaire"/>


	</form>
	
	


</body>
</html>
